name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-catalog:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install yq
      run: |
        sudo wget -qO /usr/local/bin/yq \
          https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq
        yq --version

    - name: Install Pact CLI (kda-community pact-5)
      run: |
        # Dynamically resolve the ubuntu-24 asset from latest release
        ASSET_URL=$(curl -sL https://api.github.com/repos/kda-community/pact-5/releases/latest \
          | jq -r '.assets[] | select(.name | contains("ubuntu-24")) | .browser_download_url' \
          | head -1)
        echo "Downloading: $ASSET_URL"
        curl -sSL "$ASSET_URL" -o /tmp/pact.tar.gz
        tar -xzf /tmp/pact.tar.gz -C /tmp
        sudo mv /tmp/pact /usr/local/bin/pact
        sudo chmod +x /usr/local/bin/pact
        pact --version

    - name: Validate every contract entry (BLOCKING)
      # Runs scripts/validate_contract.sh on each contract directory.
      # Enforces metadata schema, the audit_status ladder, and required docs.
      # Any VIOLATION fails the build.
      run: |
        chmod +x scripts/validate_contract.sh
        fail=0
        for dir in $(find contracts -name "metadata.yaml" -exec dirname {} \;); do
          if ! bash scripts/validate_contract.sh "$dir"; then
            fail=1
          fi
        done
        if [ "$fail" -eq 1 ]; then
          echo "::error::One or more contract entries failed validation."
          exit 1
        fi
        echo "All contract entries passed validation."

    - name: Index is up to date
      # The generated index must match committed docs/index.{md,json}.
      # Regenerate and fail if the working tree changes.
      run: |
        chmod +x scripts/generate_index.sh
        ./scripts/generate_index.sh
        if ! git diff --quiet -- docs/index.md docs/index.json; then
          echo "::error::docs/index.md or docs/index.json is stale. Run scripts/generate_index.sh and commit the result."
          git diff -- docs/index.md docs/index.json | head -60
          exit 1
        fi
        echo "Contract index is up to date."

    - name: Lint community Pact contracts
      # Only lint community/ — ecosystem/kip/core/marmalade are reference
      # artifacts from the chain or upstream; they have external dependencies
      # that require a full network context to resolve.
      # Non-blocking: syntax findings are reported but do not fail the build
      # (blocking validation is done by the validate step above).
      continue-on-error: true
      run: |
        echo "Linting community/ contracts..."
        find contracts/community -name "*.pact" | while read -r f; do
          echo "  pact $f"
          pact "$f" 2>&1 || true
        done
        echo "Lint complete."

    - name: Report catalog counts
      run: |
        total=$(find contracts -name "*.pact" | wc -l)
        community=$(find contracts/community -name "*.pact" | wc -l)
        ecosystem=$(find contracts/ecosystem -name "*.pact" | wc -l)
        echo "Total .pact files:      $total"
        echo "Community contracts:    $community"
        echo "Ecosystem (reference):  $ecosystem"
